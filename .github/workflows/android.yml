name: Android APK Build new

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show current files
        run: |
          pwd
          ls -la
          echo "===== gradle.properties ====="
          cat gradle.properties || true
          echo "===== app/build.gradle ====="
          cat app/build.gradle
          echo "===== MainActivity.kt AndroidX check ====="
          grep -R "androidx" app/src/main || true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: gradle --no-daemon --no-build-cache clean :app:assembleDebug -Dandroid.useAndroidX=true -Dandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HTDI-MES-APK
          path: app/build/outputs/apk/debug/app-debug.apk
